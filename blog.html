---
layout: default
title: Blog
---

<ul class="blog-list">
  {% for post in site.posts %}
    <li class="blog-item">
      <span class="blog-date">{{ post.date | date: "%B %d, %Y" }}</span>
      <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
      <p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
    </li>
  {% endfor %}
</ul>
